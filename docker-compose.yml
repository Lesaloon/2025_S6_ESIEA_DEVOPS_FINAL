version: '3.8'

services:
  back:
    image: lesaloon64/devops-back:latest
    container_name: devops-back
    restart: unless-stopped
    ports:
      - 8080:8080
    environment:
      - DB_HOST=maria-db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - maria-db

  maria-db:
    image: mariadb:latest
    container_name: devops-maria-db
    restart: unless-stopped
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql


volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      device: ./db_data
      o: bind